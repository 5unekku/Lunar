[alias]
# Build API docs without embedded source HTML.
doc-no-source = "doc --workspace --no-deps"

[env]
# Requires nightly; used by `cargo doc` and the alias above.
RUSTDOCFLAGS = "-Zunstable-options --html-no-source"

# wasm SIMD: lets glam (and LLVM autovectorization) use 128-bit vector ops.
# every WebGPU-capable browser supports simd128, so this costs no compatibility.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+simd128"]
