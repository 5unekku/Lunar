name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # opt into node 24 early — forced default on 2026-06-16
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang
      - run: cargo test --workspace

  build-wasm:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang
      - run: cargo build --target wasm32-unknown-unknown --package lunar-lib

  smoke:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev xvfb mesa-vulkan-drivers libvulkan1
      # SDL_VIDEODRIVER=x11 prevents SDL3 from trying Wayland (unavailable in container)
      - run: SDL_VIDEODRIVER=x11 WGPU_BACKEND=vulkan xvfb-run -a cargo run --example platform_demo -- --smoke

  build-cross:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          # i686/armv7 excluded: sdl3 0.18.4 upstream type error (XlibWindowHandle u64 vs u32 on 32-bit)
          # windows targets excluded: SDL3 cmake cross-build needs MinGW resource compiler (windres), not yet configured
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev python3-pip
      - run: rustup target add ${{ matrix.target }}
      - run: pip install cargo-zigbuild --break-system-packages
      - run: cargo zigbuild --workspace --target ${{ matrix.target }}
