name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # opt into node 24 early — forced default on 2026-06-16
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      # mesa-vulkan-drivers ships lavapipe so the headless gpu tests actually
      # run here instead of skipping for lack of an adapter
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang mesa-vulkan-drivers libvulkan1
      - run: cargo test --workspace

  build-wasm:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang
      # lunar-game covers the full facade plus both bins (lunar is wasm-gated, lunar-web is the wasm entry)
      - run: cargo build --target wasm32-unknown-unknown --package lunar-game

  smoke:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev clang xvfb mesa-vulkan-drivers libvulkan1 libx11-dev libxext-dev libxi-dev libxrandr-dev
      # SDL_VIDEODRIVER=x11 prevents SDL3 from trying Wayland (unavailable in container)
      - run: SDL_VIDEODRIVER=x11 WGPU_BACKEND=vulkan xvfb-run -a cargo run --example platform_demo -- --smoke

  build-cross:
    runs-on: ubuntu-latest
    container: rust:slim-trixie
    env:
      # every crate except the sdl3 windowing layer (lunar, lunar-render, lunar-input)
      # and lunar-audio (cubeb's nested cmake build does not cross-compile cleanly).
      # the sdl3 layer is target-independent rust verified by the x86_64/aarch64 full builds.
      ENGINE_CRATES: >-
        -p lunar-math -p lunar-core -p lunar-2d -p lunar-3d -p lunar-bsp
        -p lunar-gamedata -p lunar-atlas -p lunar-lightmap -p lunar-render-3d
        -p lunar-image -p lunar-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          # full workspace where sdl3 cross-builds; engine set elsewhere:
          # i686/armv7 hit the sdl3 0.18.4 XlibWindowHandle u64-vs-u32 bug on 32-bit,
          # windows needs a MinGW windres for SDL3's resource script
          - { target: x86_64-unknown-linux-gnu, full: true }
          - { target: aarch64-unknown-linux-gnu, full: true }
          - { target: armv7-unknown-linux-gnueabihf, full: false }
          - { target: i686-unknown-linux-gnu, full: false }
          - { target: x86_64-pc-windows-gnu, full: false }
          - { target: i686-pc-windows-gnu, full: false }
          - { target: aarch64-pc-windows-gnullvm, full: false }
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}
      - run: apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev libwayland-dev libxkbcommon-dev libegl-dev python3-pip
      - run: rustup target add ${{ matrix.target }}
      - run: pip install cargo-zigbuild --break-system-packages
      - run: |
          if [ "${{ matrix.full }}" = "true" ]; then scope="--workspace"; else scope="$ENGINE_CRATES"; fi
          cargo zigbuild --target ${{ matrix.target }} $scope
