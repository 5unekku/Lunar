[patch.crates-io]
# wgpu 29.0.1 instanceof check for GPUCanvasContext fails in wasm-bindgen;
# patched to use unchecked_into which is safe since getContext("webgpu") guarantees the type
wgpu = { path = "vendor/wgpu" }

[workspace]
members = [
    "crates/engine-core",
    "crates/engine-2d",
    "crates/engine-3d",
    "crates/engine-render",
    "crates/engine-input",
    "crates/engine-math",
    "crates/lunar",
    "crates/lunar-macros",
    "crates/engine-assets",
    "crates/engine-image",
    "crates/engine-atlas",
    "crates/engine-dialogue",
    "crates/engine-localization",
    "crates/engine-zones",
    "crates/engine-animation",
    "crates/engine-tilemap",
    "crates/engine-ui",
    "tests/api_seal",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "a game engine for Rust with ECS, wgpu rendering, and WASM support"
repository = "https://github.com/jimmy/Lunar"
homepage = "https://github.com/jimmy/Lunar"
readme = "README.md"
keywords = ["game-engine", "gamedev", "ecs", "wgpu", "2d"]
categories = ["game-engines", "graphics", "wasm"]

[workspace.dependencies]
bevy_ecs = "0.18"
glam = "0.30"
wgpu = { version = "29", default-features = false }
raw-window-handle = "0.6"
sdl3 = "0.18"
log = "0.4"
env_logger = "0.11"
pollster = "0.4"

[package]
name = "lunar-game"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
debug = ["bevy_ecs/debug"]

[[bin]]
name = "lunar"
path = "src/main.rs"

[[bin]]
name = "lunar-web"
path = "src/web.rs"

[[bin]]
name = "rpg-example"
path = "src/bin/rpg_example_main.rs"

[dependencies]
# `lunar` is the only dependency a real game needs. The rpg-example
# (item 73.5) was migrated off direct sub-crate imports — every `use` now
# goes through `lunar::prelude::*` or `lunar::engine_core::…`.
lunar = { path = "crates/lunar", package = "lunar-lib" }

# opt-in domain crate — rpg-example uses dialogue; games without dialogue
# don't add this. Localization and zones aren't used here.
engine-dialogue = { path = "crates/engine-dialogue" }

bevy_ecs = { workspace = true }
log = { workspace = true }

# web entry point only
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlCanvasElement", "CanvasRenderingContext2d"] }
