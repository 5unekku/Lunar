[patch.crates-io]
# wgpu 29.0.1 instanceof check for GPUCanvasContext fails in wasm-bindgen;
# patched to use unchecked_into which is safe since getContext("webgpu") guarantees the type
wgpu = { path = "vendor/wgpu" }

[workspace]
members = [
    "crates/engine-core",
    "crates/engine-render",
    "crates/engine-input",
    "crates/engine-audio",
    "crates/engine-math",
    "crates/engine-api",
    "crates/engine-assets",
    "crates/engine-image",
    "crates/engine-atlas",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
bevy_ecs = "0.18"
glam = "0.30"
wgpu = { version = "29", default-features = false }
raw-window-handle = "0.6"
sdl3 = "0.18"
log = "0.4"
env_logger = "0.11"
pollster = "0.4"

[package]
name = "lunar"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "lunar"
path = "src/main.rs"

[[bin]]
name = "lunar-web"
path = "src/web.rs"

[dependencies]
engine-core = { path = "crates/engine-core" }
engine-render = { path = "crates/engine-render" }
engine-input = { path = "crates/engine-input" }
engine-audio = { path = "crates/engine-audio" }
engine-math = { path = "crates/engine-math" }
engine-api = { path = "crates/engine-api" }
engine-assets = { path = "crates/engine-assets" }
engine-image = { path = "crates/engine-image" }
env_logger = { workspace = true }
log = { workspace = true }
wgpu = { workspace = true, features = ["vulkan", "metal", "gles", "wgsl"] }
sdl3 = { workspace = true, features = ["raw-window-handle"] }
raw-window-handle = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlCanvasElement", "CanvasRenderingContext2d"] }
