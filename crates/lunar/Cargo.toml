[package]
name = "lunar-lib"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "public API facade: re-exports all types game code needs from engine sub-crates"
repository.workspace = true
readme.workspace = true
categories.workspace = true
keywords.workspace = true

[features]
# select rendering dimensions. enable any combination, or neither for headless/text games.
default = ["2d"]
2d = ["dep:lunar-2d"]
3d = ["dep:lunar-3d", "dep:lunar-render-3d"]
# optional engine modules — enable only what your game uses
dialogue = ["dep:lunar-dialogue"]

[dependencies]
bevy_ecs = { workspace = true }
lunar-macros = { path = "../lunar-macros" }
lunar-math = { path = "../lunar-math" }
lunar-core = { path = "../lunar-core" }
lunar-2d = { path = "../lunar-2d", optional = true }
lunar-3d = { path = "../lunar-3d", optional = true }
lunar-render-3d = { path = "../lunar-render-3d", optional = true }
lunar-render = { path = "../lunar-render" }
lunar-input = { path = "../lunar-input" }
lunar-assets = { path = "../lunar-assets" }
lunar-dialogue = { path = "../lunar-dialogue", optional = true }
log = { workspace = true }
env_logger = { workspace = true }
# wgsl is the shader language on every platform — declared once here
wgpu = { workspace = true, features = ["wgsl"] }

# shared non-wasm deps: sdl3 windowing + portable gpu backends
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sdl3 = { workspace = true, features = ["raw-window-handle"] }
raw-window-handle = { workspace = true }
wgpu = { workspace = true, features = ["vulkan", "gles"] }
pollster = "0.4"

# platform-specific gpu backends — in separate blocks because each pulls in
# platform-exclusive bindings (windows-rs for dx12, Apple frameworks for metal)
# that won't compile on other targets. Cargo merges features across all matching
# blocks, so cross-compilation works: cfg evaluates against the build target,
# not the host. a Linux dev targeting windows already gets dx12.
[target.'cfg(target_os = "windows")'.dependencies]
wgpu = { workspace = true, features = ["dx12"] }

[target.'cfg(target_vendor = "apple")'.dependencies]
wgpu = { workspace = true, features = ["metal"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { workspace = true, features = ["web"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window"] }
js-sys = "0.3"
console_log = "0.2"
