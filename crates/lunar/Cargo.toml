[package]
name = "lunar-engine"
version.workspace = true
edition.workspace = true
license = "MIT"
description = "public API facade: re-exports all types game code needs from engine sub-crates"
repository.workspace = true
readme.workspace = true
categories.workspace = true
keywords.workspace = true

[features]
# select rendering dimensions. enable any combination, or neither for headless/text games.
default = ["2d"]
2d = ["dep:lunar-2d"]
3d = ["dep:lunar-3d", "dep:lunar-render-3d", "dep:lunar-bsp", "dep:lunar-lightmap"]
audio = ["dep:lunar-audio"]

# convenience for examples / docs / "kitchen sink" builds.
full = ["2d", "3d", "audio"]

[dependencies]
bevy_ecs = { workspace = true }
lunar-macros = { path = "../lunar-macros", version = "1.0.0" }
lunar-math = { path = "../lunar-math", version = "1.0.0" }
lunar-core = { path = "../lunar-core", version = "1.0.0" }
lunar-2d = { path = "../lunar-2d", version = "1.0.0", optional = true }
lunar-3d = { path = "../lunar-3d", version = "1.0.0", optional = true }
lunar-render-3d = { path = "../lunar-render-3d", version = "1.0.0", optional = true }
lunar-bsp      = { path = "../lunar-bsp", version = "1.0.0", optional = true }
lunar-lightmap = { path = "../lunar-lightmap", version = "1.0.0", optional = true }
lunar-render = { path = "../lunar-render", version = "1.0.0" }
lunar-input = { path = "../lunar-input", version = "1.0.0" }
lunar-assets = { path = "../lunar-assets", version = "1.0.0" }
lunar-gamedata = { path = "../lunar-gamedata", version = "1.0.0" }
lunar-audio   = { path = "../lunar-audio",    version = "1.0.0", optional = true }

log = { workspace = true }
env_logger = { workspace = true }
# wgsl is the shader language on every platform — declared once here
wgpu = { workspace = true, features = ["wgsl"] }

# shared non-wasm deps: sdl3 windowing + portable gpu backends
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sdl3 = { workspace = true, features = ["raw-window-handle"] }
raw-window-handle = { workspace = true }
wgpu = { workspace = true, features = ["vulkan", "gles"] }
pollster = "0.4"

# platform-specific gpu backends — in separate blocks because each pulls in
# platform-exclusive bindings (windows-rs for dx12, Apple frameworks for metal)
# that won't compile on other targets. Cargo merges features across all matching
# blocks, so cross-compilation works: cfg evaluates against the build target,
# not the host. a Linux dev targeting windows already gets dx12.
[target.'cfg(target_os = "windows")'.dependencies]
wgpu = { workspace = true, features = ["dx12"] }

[target.'cfg(target_vendor = "apple")'.dependencies]
wgpu = { workspace = true, features = ["metal"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { workspace = true, features = ["webgpu"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Performance"] }
js-sys = "0.3"
console_log = "0.2"
console_error_panic_hook = "0.1"
