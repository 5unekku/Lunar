[package]
name = "lunar-lib"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "public API facade: re-exports all types game code needs from engine sub-crates"
repository.workspace = true
readme.workspace = true
categories.workspace = true
keywords.workspace = true

[features]
# select a rendering dimension. exactly one should be enabled per build.
# default is 2d; future builds targeting 3d will disable default and enable dim3.
default = ["dim2"]
dim2 = ["dep:engine-2d"]
dim3 = ["dep:engine-3d"]

[dependencies]
bevy_ecs = { workspace = true }
lunar-macros = { path = "../lunar-macros" }
engine-math = { path = "../engine-math" }
engine-core = { path = "../engine-core" }
engine-2d = { path = "../engine-2d", optional = true }
engine-3d = { path = "../engine-3d", optional = true }
engine-render = { path = "../engine-render" }
engine-input = { path = "../engine-input" }
engine-assets = { path = "../engine-assets" }
log = { workspace = true }
env_logger = { workspace = true }
# wgsl is the shader language on every platform — declared once here
wgpu = { workspace = true, features = ["wgsl"] }

# shared non-wasm deps: sdl3 windowing + portable gpu backends
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sdl3 = { workspace = true, features = ["raw-window-handle"] }
raw-window-handle = { workspace = true }
wgpu = { workspace = true, features = ["vulkan", "gles"] }
pollster = "0.4"

# platform-specific gpu backends — in separate blocks because each pulls in
# platform-exclusive bindings (windows-rs for dx12, Apple frameworks for metal)
# that won't compile on other targets. Cargo merges features across all matching
# blocks, so cross-compilation works: cfg evaluates against the build target,
# not the host. a Linux dev targeting windows already gets dx12.
[target.'cfg(target_os = "windows")'.dependencies]
wgpu = { workspace = true, features = ["dx12"] }

[target.'cfg(target_vendor = "apple")'.dependencies]
wgpu = { workspace = true, features = ["metal"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { workspace = true, features = ["web"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window"] }
js-sys = "0.3"
console_log = "0.2"
