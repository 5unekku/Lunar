[package]
name = "lunar-lib"
version.workspace = true
edition.workspace = true
license = "MIT"
description = "public API facade: re-exports all types game code needs from engine sub-crates"
repository.workspace = true
readme.workspace = true
categories.workspace = true
keywords.workspace = true

[features]
# select rendering dimensions. enable any combination, or neither for headless/text games.
default = ["2d"]
2d = ["dep:lunar-2d"]
3d = ["dep:lunar-3d", "dep:lunar-render-3d", "dep:lunar-bsp", "dep:lunar-lightmap"]

# ── optional plugins (drop-in via `app.add_plugin(...)`) ──────────────────────
animation    = ["dep:lunar-plugin-animation"]
tilemap      = ["dep:lunar-plugin-tilemap"]
ui           = ["dep:lunar-plugin-ui"]
particles    = ["dep:lunar-plugin-particles"]
localization = ["dep:lunar-plugin-localization"]
dialogue     = ["dep:lunar-plugin-dialogue"]
timeline     = ["dep:lunar-plugin-timeline"]
ai           = ["dep:lunar-plugin-ai"]
zones        = ["dep:lunar-plugin-zones"]
physics-2d   = ["2d", "dep:lunar-plugin-physics-2d"]
physics-3d   = ["3d", "dep:lunar-plugin-physics-3d"]
spline       = ["3d", "dep:lunar-plugin-spline"]
camera-3d    = ["3d", "dep:lunar-plugin-camera-3d"]

# ── libraries (call directly; no plugin) ─────────────────────────────────────
pathfinding  = ["dep:lunar-pathfinding-rt"]

# everything — convenience for examples / docs / "kitchen sink" builds.
full = [
		"2d", "3d", "animation", "tilemap", "ui", "particles", "localization", "dialogue",
		"timeline", "ai", "zones", "physics-2d", "physics-3d", "spline", "camera-3d", "pathfinding",
]

[dependencies]
bevy_ecs = { workspace = true }
lunar-macros = { path = "../lunar-macros" }
lunar-math = { path = "../lunar-math" }
lunar-core = { path = "../lunar-core" }
lunar-2d = { path = "../lunar-2d", optional = true }
lunar-3d = { path = "../lunar-3d", optional = true }
lunar-render-3d = { path = "../lunar-render-3d", optional = true }
lunar-bsp      = { path = "../lunar-bsp", optional = true }
lunar-lightmap = { path = "../lunar-lightmap", optional = true }
lunar-render = { path = "../lunar-render" }
lunar-input = { path = "../lunar-input" }
lunar-assets = { path = "../lunar-assets" }
lunar-gamedata = { path = "../lunar-gamedata" }

# optional plugins
lunar-plugin-animation    = { path = "../lunar-plugin-animation", optional = true }
lunar-plugin-tilemap      = { path = "../lunar-plugin-tilemap", optional = true }
lunar-plugin-ui           = { path = "../lunar-plugin-ui", optional = true }
lunar-plugin-particles    = { path = "../lunar-plugin-particles", optional = true }
lunar-plugin-localization = { path = "../lunar-plugin-localization", optional = true }
lunar-plugin-dialogue     = { path = "../lunar-plugin-dialogue", optional = true }
lunar-plugin-timeline     = { path = "../lunar-plugin-timeline", optional = true }
lunar-plugin-ai           = { path = "../lunar-plugin-ai", optional = true }
lunar-plugin-zones        = { path = "../lunar-plugin-zones", optional = true }
lunar-plugin-physics-2d   = { path = "../lunar-plugin-physics-2d", optional = true }
lunar-plugin-physics-3d   = { path = "../lunar-plugin-physics-3d", optional = true }
lunar-plugin-spline       = { path = "../lunar-plugin-spline", optional = true }
lunar-plugin-camera-3d    = { path = "../lunar-plugin-camera-3d", optional = true }

# libraries (no plugin)
lunar-pathfinding-rt = { path = "../lunar-pathfinding-rt", optional = true }

log = { workspace = true }
env_logger = { workspace = true }
# wgsl is the shader language on every platform — declared once here
wgpu = { workspace = true, features = ["wgsl"] }

# shared non-wasm deps: sdl3 windowing + portable gpu backends
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sdl3 = { workspace = true, features = ["raw-window-handle"] }
raw-window-handle = { workspace = true }
wgpu = { workspace = true, features = ["vulkan", "gles"] }
pollster = "0.4"

# platform-specific gpu backends — in separate blocks because each pulls in
# platform-exclusive bindings (windows-rs for dx12, Apple frameworks for metal)
# that won't compile on other targets. Cargo merges features across all matching
# blocks, so cross-compilation works: cfg evaluates against the build target,
# not the host. a Linux dev targeting windows already gets dx12.
[target.'cfg(target_os = "windows")'.dependencies]
wgpu = { workspace = true, features = ["dx12"] }

[target.'cfg(target_vendor = "apple")'.dependencies]
wgpu = { workspace = true, features = ["metal"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { workspace = true, features = ["webgpu"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window"] }
js-sys = "0.3"
console_log = "0.2"
console_error_panic_hook = "0.1"
