[package]
name = "lunar-render"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "wgpu 2D renderer with sprite batching, text rendering, camera, layers, and custom render passes"
repository.workspace = true
readme.workspace = true
categories.workspace = true
keywords.workspace = true

[dependencies]
rustc-hash = { workspace = true }
wgpu = { workspace = true, features = ["vulkan", "metal", "gles", "wgsl"] }
raw-window-handle = "0.6"
lunar-math = { path = "../lunar-math" }
lunar-core = { path = "../lunar-core" }
lunar-assets = { path = "../lunar-assets" }
lunar-atlas = { path = "../lunar-atlas" }
bevy_ecs = { workspace = true }
log = { workspace = true }
bytemuck = "1.23"
cosmic-text = "0.12"
guillotiere = "0.6"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
sdl3 = { workspace = true }
pollster = "0.4"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { workspace = true, features = ["vulkan", "metal", "gles", "wgsl", "web"] }
wasm-bindgen-futures = "0.4"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlCanvasElement", "OffscreenCanvas"] }
