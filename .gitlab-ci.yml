default:
  image: rust:slim-trixie
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev
    # rust-toolchain.toml is picked up automatically — installs the right channel, targets, and components
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - ~/.cargo/registry
      - ~/.cargo/git

stages:
  - check
  - build
  - publish

clippy:
  stage: check
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - ~/.cargo/registry
      - ~/.cargo/git
      - target/
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

test:
  stage: check
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - ~/.cargo/registry
      - ~/.cargo/git
      - target/
  script:
    - cargo test --workspace

.cross: &cross
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev python3-pip
    - pip install cargo-zigbuild --break-system-packages
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - ~/.cargo/registry
      - ~/.cargo/git

build-linux-x86_64:
  <<: *cross
  script:
    - rustup target add x86_64-unknown-linux-gnu
    - cargo zigbuild --workspace --target x86_64-unknown-linux-gnu

build-linux-i686:
  <<: *cross
  script:
    - rustup target add i686-unknown-linux-gnu
    - cargo zigbuild --workspace --target i686-unknown-linux-gnu

build-linux-aarch64:
  <<: *cross
  script:
    - rustup target add aarch64-unknown-linux-gnu
    - cargo zigbuild --workspace --target aarch64-unknown-linux-gnu

build-linux-armv7:
  <<: *cross
  script:
    - rustup target add armv7-unknown-linux-gnueabihf
    - cargo zigbuild --workspace --target armv7-unknown-linux-gnueabihf

build-windows-x86_64:
  <<: *cross
  script:
    - rustup target add x86_64-pc-windows-gnu
    - cargo zigbuild --workspace --target x86_64-pc-windows-gnu

build-windows-i686:
  <<: *cross
  script:
    - rustup target add i686-pc-windows-gnu
    - cargo zigbuild --workspace --target i686-pc-windows-gnu

build-windows-aarch64:
  <<: *cross
  script:
    - rustup target add aarch64-pc-windows-gnullvm
    - cargo zigbuild --workspace --target aarch64-pc-windows-gnullvm

smoke:
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake pkg-config libssl-dev xvfb mesa-vulkan-drivers libvulkan1
  script:
    - WGPU_BACKEND=vulkan xvfb-run -a cargo run --example platform_demo -- --smoke

build-wasm:
  stage: build
  cache:
    key:
      files:
        - Cargo.lock
        - rust-toolchain.toml
    paths:
      - ~/.cargo/registry
      - ~/.cargo/git
      - target/
  script:
    - cargo build --target wasm32-unknown-unknown --package lunar-lib

publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - cargo publish --package lunar-lib --token "$CARGO_REGISTRY_TOKEN"
