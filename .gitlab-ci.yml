default:
  image: rust:slim-trixie
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential pkg-config libssl-dev
    # rust-toolchain.toml is picked up automatically — installs the right channel, targets, and components

stages:
  - check
  - publish

clippy:
  stage: check
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

test:
  stage: check
  script:
    - cargo test --workspace

wasm:
  stage: check
  script:
    - cargo build --target wasm32-unknown-unknown --package lunar-lib

publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - cargo publish --package lunar-lib --token "$CARGO_REGISTRY_TOKEN"
